<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark">S</span>
        <div>
          <h1>Simple Shop</h1>
          <p>Final project store</p>
        </div>
      </div>
      <button id="cart-toggle" class="cart-button" aria-label="Open cart">
        Cart <span id="cart-count" class="cart-count">0</span>
      </button>
    </header>

    <main class="layout">
      <section class="catalog">
        <div class="section-head">
          <h2>Products</h2>
          <div class="filters">
            <input id="search" type="search" placeholder="Search products" />
            <select id="category">
              <option value="all">All categories</option>
            </select>
          </div>
        </div>
        <div id="product-grid" class="product-grid"></div>
      </section>

      <aside id="cart" class="cart" aria-live="polite">
        <div class="cart-head">
          <h2>Your cart</h2>
          <button id="cart-close" class="icon-button" aria-label="Close cart">&times;</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <strong id="cart-subtotal">$0.00</strong>
          </div>
          <div class="summary-row">
            <span>Tax (8%)</span>
            <strong id="cart-tax">$0.00</strong>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <strong id="cart-total">$0.00</strong>
          </div>
          <button id="checkout" class="primary">Checkout</button>
        </div>
      </aside>
    </main>

    <footer class="site-footer">
      <p>Final project starter.</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
